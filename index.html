<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coleideando - Generador Multi-Página Pro con Portada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&family=Caveat:wght@400;600;700&family=Patrick+Hand&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        fredoka: ['Fredoka', 'sans-serif'],
                        display: ['Caveat', 'cursive'],
                        hand: ['Patrick Hand', 'cursive'],
                        body: ['Nunito', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        .worksheet-preview {
            width: 794px;
            height: 1123px;
            background: white;
            border: 4px solid #000;
            padding: 40px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-sizing: border-box;
            overflow: hidden;
        }

        .cover-page {
            background-color: var(--bg-cover);
            border: 8px solid var(--primary);
            padding: 60px;
            justify-content: flex-start;
        }

        .lollipop-icon {
            width: 32px; height: 32px;
            background: radial-gradient(circle, var(--lollipop-inner) 40%, #fff 41%, var(--primary) 50%);
            border-radius: 50%; position: relative; flex-shrink: 0;
        }
        .lollipop-icon::after {
            content: ''; position: absolute; bottom: -20px; left: 15px;
            width: 2px; height: 20px; background-color: #999;
        }

        .page-content-area {
            flex-grow: 1;
            max-height: 780px; /* Límite estricto para que no se corten las actividades */
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 24px;
            box-sizing: border-box;
        }

        .page-content-area section {
            page-break-inside: avoid;
            break-inside: avoid;
        }

        .bg-grid-dots { background-image: radial-gradient(#d1d5db 1.5px, transparent 1.5px); background-size: 16px 16px; }
        .bg-lines { background-image: linear-gradient(#e2e8f0 1px, transparent 1px); background-size: 100% 24px; }

        @page {
            size: A4 portrait;
            margin: 0 !important;
        }

        @media print {
            .no-print { display: none !important; }
            
            html, body {
                background: white !important;
                margin: 0 !important;
                padding: 0 !important;
                height: auto !important;
                overflow: visible !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            #workspace-wrapper {
                padding: 0 !important;
                margin: 0 !important;
                background: transparent !important;
                overflow: visible !important;
                display: block !important;
                width: 100% !important;
                height: auto !important;
            }

            #capture-area {
                display: block !important;
                gap: 0 !important;
            }

            .worksheet-preview {
                width: 210mm !important;  
                height: 297mm !important;
                border: none !important;  
                box-shadow: none !important;
                margin: 0 !important;
                padding: 10mm !important; 
                page-break-inside: avoid !important;
                page-break-after: always !important;
                break-after: page !important;
                display: flex !important;
                overflow: hidden !important;
            }

            .cover-page {
                border: 8mm solid var(--primary) !important;
            }
        }

        .theme-azul { --primary: #8cb1dc; --bg-cover: #e8f4fd; --lollipop-inner: #ff9aa2; }
        .theme-verde { --primary: #22c55e; --bg-cover: #f0fdf4; --lollipop-inner: #fcd34d; }
        .theme-rosa { --primary: #ff9aa2; --bg-cover: #fff5f6; --lollipop-inner: #ffdac1; }
        .theme-naranja { --primary: #f59e0b; --bg-cover: #fffbeb; --lollipop-inner: #db2777; }
    </style>
</head>
<body class="bg-gray-800 font-body flex h-screen overflow-hidden">

    <aside class="w-2/5 bg-white shadow-2xl h-full overflow-y-auto p-6 no-print z-10 border-r-4 border-black">
        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-black rounded-full flex items-center justify-center text-white">
                    <i class="fa-solid fa-wand-magic-sparkles text-xl"></i>
                </div>
                <h1 class="font-fredoka text-xl uppercase italic">Coleideando Studio</h1>
            </div>
            <button onclick="window.print()" class="bg-green-500 text-white font-fredoka py-2 px-4 rounded-xl shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] border-2 border-black hover:translate-y-0.5 hover:shadow-none transition-all uppercase tracking-wider text-xs">
                <i class="fa-solid fa-print mr-1"></i> Imprimir PDF
            </button>
        </div>

        <div class="space-y-4">

                    <i class="fa-solid fa-brain"></i>
                    <span>Generador Curricular Dinámico</span>
                </div>
                
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-[9px] font-bold text-purple-950 uppercase mb-1">Nivel Educativo</label>
                        <select id="sel-nivel" onchange="actualizarContenidos()" class="w-full border-2 border-black p-1 rounded-lg text-[11px] font-bold bg-white cursor-pointer">
                            <option value="1-2-primaria">1º y 2º de Primaria</option>
                            <option value="3-4-primaria">3º y 4º de Primaria</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[9px] font-bold text-purple-950 uppercase mb-1">Contenido Curricular</label>
                        <select id="sel-contenido" class="w-full border-2 border-black p-1 rounded-lg text-[11px] font-bold bg-white cursor-pointer">
                            </select>
                    </div>
                </div>

                <div>
                    <label class="block text-[9px] font-bold text-purple-950 uppercase mb-1">Temática del Proyecto</label>
                    <select id="sel-tematica" class="w-full border-2 border-black p-1.5 rounded-lg text-xs font-bold bg-white cursor-pointer">
                        <option value="piratas">🏴‍☠️ Piratas y Corsarios</option>
                        <option value="espacio">🚀 Astronautas y Galaxias</option>
                    </select>
                </div>

                <button onclick="aplicarPlantillaTematica()" class="w-full bg-purple-600 text-white font-fredoka py-2 rounded-lg border-2 border-black shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] hover:translate-y-0.5 hover:shadow-none transition-all text-xs uppercase tracking-wide">
                    ✨ Generar Ficha Completa
                </button>
            </section>

            <section class="bg-gray-50 p-3 rounded-xl border-2 border-black">
                <label class="block font-bold text-gray-700 mb-1 uppercase text-[10px] tracking-widest">Tema del documento</label>
                <div class="grid grid-cols-4 gap-2">
                    <button onclick="changeTheme('azul')" class="h-6 bg-[#8cb1dc] rounded-full border-2 border-black"></button>
                    <button onclick="changeTheme('verde')" class="h-6 bg-green-500 rounded-full border-2 border-black"></button>
                    <button onclick="changeTheme('rosa')" class="h-6 bg-[#ff9aa2] rounded-full border-2 border-black"></button>
                    <button onclick="changeTheme('naranja')" class="h-6 bg-orange-500 rounded-full border-2 border-black"></button>
                </div>
            </section>

            <section class="bg-gray-50 p-3 rounded-xl border-2 border-black space-y-2">
                <div class="flex items-center justify-between">
                    <label class="block font-bold text-gray-700 text-[10px] tracking-widest uppercase">Personalización de Portada</label>
                    <div class="flex items-center gap-1.5">
                        <span class="text-[10px] font-bold text-gray-500 uppercase">Incluir</span>
                        <input type="checkbox" id="in-incluir-portada" onchange="togglePortada(this.checked)" checked class="w-4 h-4 accent-black cursor-pointer">
                    </div>
                </div>
                <input type="text" id="in-portada-titulo" oninput="updateHeader()" class="w-full border-2 border-black p-1.5 rounded-lg font-fredoka text-sm uppercase tracking-wide" value="">
            </section>

            <section class="bg-gray-50 p-3 rounded-xl border-2 border-black space-y-2">
                <label class="block font-bold text-gray-700 text-[10px] tracking-widest uppercase">Estructura Global de Cabecera</label>
                <input type="text" id="in-titulo" oninput="updateHeader()" class="w-full border-2 border-black p-1.5 rounded-lg font-hand text-base" value="">
                <input type="text" id="in-subtitulo" oninput="updateHeader()" class="w-full border-2 border-black p-1.5 rounded-lg font-display text-base" value="">
            </section>

            <div id="editor-blocks-container" class="space-y-4"></div>

            <section class="p-4 bg-purple-50 border-2 border-dashed border-black rounded-xl text-center">
                <p class="font-bold text-xs uppercase tracking-wider mb-3 text-purple-900">Añadir Actividad Temática Coherente</p>
                <div class="grid grid-cols-3 gap-2 mb-2">
                    <button onclick="addBlockData('learn')" class="bg-amber-100 border-2 border-black p-2 rounded-lg font-hand text-xs font-bold hover:bg-amber-200 transition-colors">+ Teoría</button>
                    <button onclick="addBlockData('order')" class="bg-pink-100 border-2 border-black p-2 rounded-lg font-hand text-xs font-bold hover:bg-pink-200 transition-colors">+ Ordenar</button>
                    <button onclick="addBlockData('drawing')" class="bg-cyan-100 border-2 border-black p-2 rounded-lg font-hand text-xs font-bold hover:bg-cyan-200 transition-colors">+ Dibujo</button>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="addBlockData('boxes')" class="bg-emerald-100 border-2 border-black p-2 rounded-lg font-hand text-xs font-bold hover:bg-emerald-200 transition-colors">+ Buzones</button>
                    <button onclick="addBlockData('connect')" class="bg-purple-100 border-2 border-black p-2 rounded-lg font-hand text-xs font-bold hover:bg-purple-200 transition-colors">+ Unir</button>
                    <button onclick="addBlockData('inline-gaps')" class="bg-indigo-100 border-2 border-black p-2 rounded-lg font-hand text-xs font-bold hover:bg-indigo-200 transition-colors">+ Huecos</button>

            </section>
        </div>
    </aside>

        <div id="capture-area" class="theme-azul flex flex-col gap-8"></div>
    </main>

        // El generador contextual ahora obtiene siempre datos reales de la base de datos superior
        function obtenerBancoContextual(contenido, tematica, tipo) {
            if (infoTematica[contenido] && infoTematica[contenido][tematica]) {
                const b = infoTematica[contenido][tematica].blocks;
                const match = b.find(x => x.type === tipo);
                if (match) return JSON.parse(JSON.stringify(match));
            }
            // En el improbable caso de fallo catastrófico de lectura JSON, 
            // proporciona un respaldo genérico pero sin el texto "ejemplo 1".
            return { type: tipo, question: 'Actividad de repaso general', content: 'Repasa el contenido curricular con atención.', lines: ['Primera fase de la misión completada.', 'Segunda fase en proceso de ejecución.', 'Tercera fase preparada para iniciar.'], words: 'palabra, concepto, término, idea', label1: 'GRUPO A', label2: 'GRUPO B', label3: 'REVISIÓN', left1: 'Dato A', right1: 'Respuesta A.', left2: 'Dato B', right2: 'Respuesta B.', left3: 'Dato C', right3: 'Respuesta C.', text: 'El astronauta completó su [HUECO] de forma exitosa utilizando la [HUECO] principal del [HUECO].' };
        }

        let currentTheme = 'azul';
        let incluirPortada = true;
        let blocks = [];

        function aplicarPlantillaTematica() {
            const contenido = document.getElementById('sel-contenido').value;
            const tematica = document.getElementById('sel-tematica').value;
            const nivelSelect = document.getElementById('sel-nivel');
            const nivelTexto = nivelSelect.options[nivelSelect.selectedIndex].text;
            
            const plantilla = infoTematica[contenido]?.[tematica];
            
            if (plantilla) {
                document.getElementById('in-titulo').value = plantilla.titulo;
                document.getElementById('in-subtitulo').value = plantilla.subtitulo + ' — ' + nivelTexto;
                document.getElementById('in-portada-titulo').value = plantilla.portada;
                blocks = JSON.parse(JSON.stringify(plantilla.blocks));
                changeTheme(plantilla.theme);
                renderApp();
            } else {
                // Generador en tiempo real combinando bloques
                const titu = contenido.charAt(0).toUpperCase() + contenido.slice(1).replace(/_/g, ' ');
                document.getElementById('in-titulo').value = `Misión de ${titu}`;
                document.getElementById('in-subtitulo').value = `Trabajando los contenidos en un entorno de ${tematica} — ${nivelTexto}`;
                document.getElementById('in-portada-titulo').value = `${titu.toUpperCase()} ${tematica.toUpperCase()}`;
                
                blocks = [
                    obtenerBancoContextual(contenido, tematica, 'learn'),
                    obtenerBancoContextual(contenido, tematica, 'boxes'),
                    obtenerBancoContextual(contenido, tematica, 'connect'),
                    obtenerBancoContextual(contenido, tematica, 'inline-gaps'),
                    obtenerBancoContextual(contenido, tematica, 'order'),
                    obtenerBancoContextual(contenido, tematica, 'drawing')
                ];
                blocks.forEach((b, i) => b.id = Date.now() + i);
                changeTheme(tematica === 'piratas' ? 'naranja' : 'azul');
                renderApp();
            }
        }

        function changeTheme(color) {
            currentTheme = color;
            document.getElementById('capture-area').className = 'theme-' + color;
            updateHeader();
        }

        function togglePortada(checked) {
            incluirPortada = checked;
            const inputTitulo = document.getElementById('in-portada-titulo');
            if(inputTitulo) inputTitulo.disabled = !checked;
            renderPreviewOnly();
        }

        function updateHeader() {
            renderPreviewOnly();
        }

        function addBlockData(type) {
            const newId = Date.now();
            const contenido = document.getElementById('sel-contenido').value;
            const tematica = document.getElementById('sel-tematica').value;
            
            const bloqueContextual = obtenerBancoContextual(contenido, tematica, type);
            bloqueContextual.id = newId;

            blocks.push(bloqueContextual);
            renderApp();
        }

        function deleteBlock(id) {
            blocks = blocks.filter(b => b.id !== id);
            renderApp();
        }

        function updateBlockValue(id, key, value, index = null) {
            const block = blocks.find(b => b.id === id);
            if (block) {
                if (index !== null) {
                    block[key][index] = value;
                } else {
                    block[key] = value;
                }
                renderPreviewOnly();
            }
        }

        function renderApp() {
            const container = document.getElementById('editor-blocks-container');
            container.innerHTML = '';

            blocks.forEach((block, num) => {
                const div = document.createElement('div');
                div.className = 'bg-gray-50 p-4 rounded-xl border-2 border-black space-y-2 relative shadow-sm';
                
                let html = `<button onclick="deleteBlock(${block.id})" class="absolute top-2 right-2 text-gray-400 hover:text-red-500 text-xs"><i class="fa-solid fa-trash"></i></button>`;
                html += `<span class="bg-black text-white text-[9px] px-2 py-0.5 rounded font-fredoka uppercase tracking-wider">Módulo ${num + 1}: ${block.type}</span>`;

                if (block.type === 'learn') {
                    html += `<textarea oninput="updateBlockValue(${block.id}, 'content', this.value)" class="w-full border-2 border-black p-1.5 rounded-lg font-hand text-sm h-16">${block.content}</textarea>`;
                } else if (block.type === 'order') {
                    html += `
                        <input type="text" value="${block.question}" oninput="updateBlockValue(${block.id}, 'question', this.value)" class="w-full border-2 border-black p-1.5 rounded-lg font-bold text-xs">
                        <input type="text" value="${block.lines[0]}" oninput="updateBlockValue(${block.id}, 'lines', this.value, 0)" class="w-full border p-1 rounded text-xs">
                        <input type="text" value="${block.lines[1]}" oninput="updateBlockValue(${block.id}, 'lines', this.value, 1)" class="w-full border p-1 rounded text-xs">
                        <input type="text" value="${block.lines[2]}" oninput="updateBlockValue(${block.id}, 'lines', this.value, 2)" class="w-full border p-1 rounded text-xs">`;
                } else if (block.type === 'drawing') {
                    html += `<input type="text" value="${block.question}" oninput="updateBlockValue(${block.id}, 'question', this.value)" class="w-full border-2 border-black p-1.5 rounded-lg text-xs font-bold">`;
                } else if (block.type === 'boxes') {
                    html += `
                        <input type="text" value="${block.question}" oninput="updateBlockValue(${block.id}, 'question', this.value)" class="w-full border-2 border-black p-1.5 rounded-lg font-bold text-xs">
                        <input type="text" value="${block.words}" oninput="updateBlockValue(${block.id}, 'words', this.value)" class="w-full border p-1 rounded text-xs" placeholder="Palabras separadas por comas">
                        <div class="grid grid-cols-3 gap-1">
                            <input type="text" value="${block.label1}" oninput="updateBlockValue(${block.id}, 'label1', this.value)" class="p-1 border rounded text-[10px]">
                            <input type="text" value="${block.label2}" oninput="updateBlockValue(${block.id}, 'label2', this.value)" class="p-1 border rounded text-[10px]">
                            <input type="text" value="${block.label3}" oninput="updateBlockValue(${block.id}, 'label3', this.value)" class="p-1 border rounded text-[10px]">
                        </div>`;
                } else if (block.type === 'connect') {
                    html += `
                        <input type="text" value="${block.question}" oninput="updateBlockValue(${block.id}, 'question', this.value)" class="w-full border-2 border-black p-1.5 rounded-lg font-bold text-xs mb-1">
                        <div class="p-2 bg-purple-50 rounded-lg border border-purple-300 space-y-1">
                            <div class="grid grid-cols-2 gap-1 text-[10px] font-bold text-purple-900 uppercase tracking-wider"><span>Izquierda</span><span>Derecha (Pareja)</span></div>
                            <div class="grid grid-cols-2 gap-1"><input type="text" class="p-1 text-xs border border-black rounded" value="${block.left1}" oninput="updateBlockValue(${block.id}, 'left1', this.value)"> <input type="text" class="p-1 text-xs border border-black rounded" value="${block.right1}" oninput="updateBlockValue(${block.id}, 'right1', this.value)"></div>
                            <div class="grid grid-cols-2 gap-1"><input type="text" class="p-1 text-xs border border-black rounded" value="${block.left2}" oninput="updateBlockValue(${block.id}, 'left2', this.value)"> <input type="text" class="p-1 text-xs border border-black rounded" value="${block.right2}" oninput="updateBlockValue(${block.id}, 'right2', this.value)"></div>
                            <div class="grid grid-cols-2 gap-1"><input type="text" class="p-1 text-xs border border-black rounded" value="${block.left3}" oninput="updateBlockValue(${block.id}, 'left3', this.value)"> <input type="text" class="p-1 text-xs border border-black rounded" value="${block.right3}" oninput="updateBlockValue(${block.id}, 'right3', this.value)"></div>
                        </div>`;
                } else if (block.type === 'inline-gaps') {
                    html += `
                        <input type="text" value="${block.question}" oninput="updateBlockValue(${block.id}, 'question', this.value)" class="w-full border-2 border-black p-1.5 rounded-lg font-bold text-xs">
                        <textarea oninput="updateBlockValue(${block.id}, 'text', this.value)" class="w-full border p-1 rounded text-xs h-12">${block.text}</textarea>`;
                }

                div.innerHTML = html;
                container.appendChild(div);
            });

            renderPreviewOnly();
        }

        function createNewPageMarkup(pageNum) {
            const pageDiv = document.createElement('div');
            pageDiv.className = 'worksheet-preview shadow-[15px_15px_0px_0px_rgba(0,0,0,1)] flex flex-col flex-shrink-0 mb-8';
            
            const titleVal = document.getElementById('in-titulo') ? document.getElementById('in-titulo').value : '';
            const subtitleVal = document.getElementById('in-subtitulo') ? document.getElementById('in-subtitulo').value : '';
            const colors = { azul: 'text-blue-600', verde: 'text-green-600', rosa: 'text-pink-600', naranja: 'text-orange-600' };

            pageDiv.innerHTML = `
                <header class="flex justify-between items-start border-b-4 border-black pb-3 mb-4 flex-shrink-0">
                  <div>
                    <h1 class="font-hand text-5xl font-bold tracking-tight text-gray-900">${titleVal}</h1>
                    <p class="font-display text-2xl italic ${colors[currentTheme] || 'text-blue-600'}">${subtitleVal}</p>
                  </div>
                  <div class="border-4 border-black p-2 rounded-xl bg-gray-50 text-xs font-hand text-center w-44">
                    NOMBRE: ______________________<br>FECHA: ____/____/____
                  </div>
                </header>
                <div class="page-content-area flex-grow flex flex-col justify-start gap-6 overflow-hidden"></div>
                <footer class="mt-auto flex justify-between font-display text-gray-400 border-t-2 border-black pt-2 text-xs flex-shrink-0">
                    <span>Material Educativo Autorizado — @coleideando</span>
                    <span>Página ${pageNum}</span>
                </footer>
            `;
            return pageDiv;
        }

        function renderPreviewOnly() {
            const captureArea = document.getElementById('capture-area');
            captureArea.innerHTML = '';

            let pageIndex = 1;

            if (incluirPortada) {
                const coverPageDiv = document.createElement('div');
                coverPageDiv.className = 'worksheet-preview cover-page shadow-[15px_15px_0px_0px_rgba(0,0,0,1)]';
                
                const dynamicCoverTitle = document.getElementById('in-portada-titulo') ? document.getElementById('in-portada-titulo').value : '';
                
                coverPageDiv.innerHTML = `
                    <div class="mt-10 text-left">
                        <h1 class="font-fredoka text-6xl text-white uppercase tracking-[4px] leading-tight m-0 mb-10 drop-shadow-[3px_3px_0px_rgba(0,0,0,1)]">
                            Materiales<br>y recursos
                        </h1>
                        <div class="border-[3px] border-dashed border-black rounded-2xl p-6 bg-white/60 inline-block max-w-[90%] shadow-sm">
                            <div class="font-fredoka text-xl text-gray-700 uppercase mb-2 tracking-widest font-bold opacity-80">Contenido de la ficha:</div>
                            <h2 class="font-fredoka text-5xl text-black uppercase tracking-wider m-0">${dynamicCoverTitle}</h2> 
                        </div>
                    </div>

                    <div class="absolute top-[520px] left-[100px] right-[60px] flex flex-col gap-10">
                        <div class="flex items-center gap-6">
                            <div class="lollipop-icon"></div>
                            <p class="font-display text-3xl text-[#2c3e50] m-0 leading-tight">Este recurso ha sido creado por <strong>@coleideando</strong> y es de uso personal.</p>
                        </div>
                        <div class="flex items-center gap-6">
                            <div class="lollipop-icon"></div>
                            <p class="font-display text-3xl text-[#2c3e50] m-0 leading-tight">Estaría encantada de que lo usaras en tu aula y me menciones.</p>
                        </div>
                        <div class="flex items-center gap-6">
                            <div class="lollipop-icon"></div>
                            <p class="font-display text-3xl text-[#2c3e50] m-0 leading-tight">No puede ser copiado o distribuido sin el consentimiento de la autora.</p>
                        </div>
                    </div>

                    <svg class="absolute bottom-12 left-12 w-[300px]" viewBox="0 0 120 70" fill="none">
                        <path d="M 10 70 A 50 50 0 0 1 110 70" stroke="var(--primary)" stroke-width="7" stroke-linecap="round"/>
                        <path d="M 20 70 A 40 40 0 0 1 100 70" stroke="var(--lollipop-inner)" stroke-width="7" stroke-linecap="round"/>
                        <path d="M 30 70 A 30 30 0 0 1 90 70" stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>
                    </svg>

                    <div class="absolute bottom-12 right-12 bg-white/90 py-2 px-6 rounded-full border-2 border-black flex items-center gap-3 shadow-sm">
                        <span class="font-fredoka text-lg text-[#333]">@coleideando</span>
                    </div>
                `;
                captureArea.appendChild(coverPageDiv);
                pageIndex = 2;
            }

            let currentPage = createNewPageMarkup(pageIndex);
            captureArea.appendChild(currentPage);
            let contentArea = currentPage.querySelector('.page-content-area');

            let exerciseCounter = 1; 

            blocks.forEach((block) => {
                const sec = document.createElement('section');
                sec.className = "w-full flex-shrink-0";

                let isExercise = ['order', 'drawing', 'boxes', 'connect', 'inline-gaps'].includes(block.type);
                let currentNum = isExercise ? exerciseCounter++ : null;

                if (block.type === 'learn') {
                    sec.className = 'border-[4px] border-black rounded-[2rem] p-4 bg-teal-50/10 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] w-full flex-shrink-0';
                    sec.innerHTML = `
                        <h2 class="font-hand text-2xl font-bold mb-1 text-emerald-600 flex items-center gap-1">⭐ Aprende:</h2>
                        <p class="font-hand text-xl leading-snug">${block.content}</p>
                    `;
                } 
                else if (block.type === 'order') {
                    sec.innerHTML = `
                        <div class="flex items-center gap-3 mb-2">
                            <div class="bg-black text-white rounded-full w-7 h-7 flex items-center justify-center font-bold text-sm flex-shrink-0">${currentNum}</div>
                            <h3 class="font-hand text-2xl font-bold">${block.question}</h3>
                        </div>
                        <div class="space-y-1.5 font-hand text-lg px-2">
                            ${block.lines.map(line => `
                                <div class="flex items-center justify-between bg-gray-50 p-2 border-2 border-black rounded-xl">
                                    <span>${line}</span>
                                    <div class="w-7 h-7 border-2 border-black rounded-full bg-white flex-shrink-0"></div>
                                </div>
                            `).join('')}
                        </div>`;
                } 
                else if (block.type === 'drawing') {
                    sec.innerHTML = `
                        <div class="flex items-center gap-3 mb-2">
                            <div class="bg-black text-white rounded-full w-7 h-7 flex items-center justify-center font-bold text-sm flex-shrink-0">${currentNum}</div>
                            <h3 class="font-hand text-2xl font-bold">${block.question}</h3>
                        </div>
                        <div class="grid grid-cols-2 gap-4 h-28">
                            <div class="border-4 border-black bg-grid-dots rounded-2xl bg-white"></div>
                            <div class="border-4 border-black rounded-2xl bg-lines bg-local"></div>
                        </div>`;
                } 
                else if (block.type === 'boxes') {
                    const badgeColors = ['bg-amber-100', 'bg-blue-100', 'bg-pink-100', 'bg-green-100'];
                    const wordsList = block.words ? block.words.split(',').map(w => w.trim()).filter(w => w !== '') : [];
                    sec.innerHTML = `
                        <div class="flex items-center gap-3 mb-2">
                            <div class="bg-black text-white rounded-full w-7 h-7 flex items-center justify-center font-bold text-sm flex-shrink-0">${currentNum}</div>
                            <h3 class="font-hand text-2xl font-bold">${block.question}</h3>
                        </div>
                        <div class="flex flex-wrap gap-2 justify-center mb-3">
                            ${wordsList.map((w, i) => `<span class="px-4 py-1 border-2 border-black rounded-xl font-hand ${badgeColors[i % 4]} font-bold text-base shadow-sm">${w}</span>`).join('')}
                        </div>
                        <div class="grid grid-cols-3 gap-3">
                            <div class="border-[3px] border-black bg-emerald-50/10 rounded-2xl p-2 h-24 font-hand"><span class="text-emerald-700 font-bold text-sm block mb-1">${block.label1}</span><div class="border-b border-dashed border-gray-400 mt-4"></div></div>
                            <div class="border-[3px] border-black bg-blue-50/10 rounded-2xl p-2 h-24 font-hand"><span class="text-blue-700 font-bold text-sm block mb-1">${block.label2}</span><div class="border-b border-dashed border-gray-400 mt-4"></div></div>
                            <div class="border-[3px] border-black bg-pink-50/10 rounded-2xl p-2 h-24 font-hand"><span class="text-pink-700 font-bold text-sm block mb-1">${block.label3}</span><div class="border-b border-dashed border-gray-400 mt-4"></div></div>
                        </div>`;
                } 
                else if (block.type === 'connect') {
                    sec.innerHTML = `
                        <div class="flex items-center gap-3 mb-2">
                            <div class="bg-black text-white rounded-full w-7 h-7 flex items-center justify-center font-bold text-sm flex-shrink-0">${currentNum}</div>
                            <h3 class="font-hand text-2xl font-bold">${block.question}</h3>
                        </div>
                        <div class="border-[3px] border-black rounded-[2rem] p-4 bg-white space-y-2 font-hand text-xl shadow-sm">
                            <div class="flex justify-between items-center px-4">
                                <div class="flex items-center gap-2"><span>${block.left1}</span> <span class="text-sm text-gray-400">●</span></div>
                                <div class="flex items-center gap-2"><span class="text-sm text-gray-400">●</span> <span>${block.right1}</span></div>
                            </div>
                            <div class="flex justify-between items-center px-4">
                                <div class="flex items-center gap-2"><span>${block.left2}</span> <span class="text-sm text-gray-400">●</span></div>
                                <div class="flex items-center gap-2"><span class="text-sm text-gray-400">●</span> <span>${block.right2}</span></div>
                            </div>
                            <div class="flex justify-between items-center px-4">
                                <div class="flex items-center gap-2"><span>${block.left3}</span> <span class="text-sm text-gray-400">●</span></div>
                                <div class="flex items-center gap-2"><span class="text-sm text-gray-400">●</span> <span>${block.right3}</span></div>
                            </div>
                        </div>`;
                } 
                else if (block.type === 'inline-gaps') {
                    let processed = block.text ? block.text.replace(/\[HUECO\]/g, '<span class="inline-flex w-24 border-2 border-dashed border-gray-400 h-7 bg-gray-50 rounded-xl align-middle mx-1"></span>') : '';
                    sec.innerHTML = `
                        <div class="flex items-center gap-3 mb-2">
                            <div class="bg-black text-white rounded-full w-7 h-7 flex items-center justify-center font-bold text-sm flex-shrink-0">${currentNum}</div>
                            <h3 class="font-hand text-2xl font-bold">${block.question}</h3>
                        </div>
                        <div class="border-[3px] border-black rounded-[2rem] p-4 bg-white font-hand text-xl leading-[2.2rem] shadow-sm">
                            ${processed}
                        </div>`;
                }

                contentArea.appendChild(sec);
                contentArea.getBoundingClientRect();

                // LÍMITE REDUCIDO A 780px PARA EVITAR CORTES EN IMPRESORA A4 FÍSICA
                if (contentArea.scrollHeight > 780) { 
                    if (contentArea.children.length > 1) {
                        contentArea.removeChild(sec);
                        
                        pageIndex++;
                        currentPage = createNewPageMarkup(pageIndex);
                        captureArea.appendChild(currentPage);
                        contentArea = currentPage.querySelector('.page-content-area');
                        
                        contentArea.appendChild(sec);
                    }
                }
            });
        }

        // Lanzamiento automático inicial con la nueva estructura
        actualizarContenidos();
        aplicarPlantillaTematica();
    </script>
</body>
</html>
